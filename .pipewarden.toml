# Pipewarden runs against itself in CI.
[stages]
docker = false  # no docker daemon in our test env
vulns  = false  # we don't ship lockfiles here

[secrets]
allowlist_strings = ["AKIAIOSFODNN7EXAMPLE"]
# Tests contain known-fake private keys for the private-key.pem rule.
# .pipewarden.toml excluded to avoid false positives from allowlist_strings entries.
allowlist_paths   = ["dist/**", ".pipewarden-venv/**", "tests/test_secrets.py", ".pipewarden.toml"]
