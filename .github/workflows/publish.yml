# Publishes a new release to PyPI and attaches signed artifacts to the
# GitHub Release whenever a version tag (e.g. v1.3.0) is pushed.
#
# Required secrets / environments:
#   - GitHub Environment named "release" must exist (enforces manual approval)
#   - PYPI_API_TOKEN must be set in that environment

name: Publish to PyPI

on:
  push:
    # Only trigger on version tags — never on branch pushes
    tags:
      - "v*.*.*"

permissions:
  contents: write    # needed to create/update the GitHub Release and attach files
  id-token: write    # needed by Sigstore to request a short-lived signing certificate

jobs:
  build-and-publish:
    name: Build, publish, and sign release artifacts
    runs-on: ubuntu-latest

    # Ties the job to the "release" environment so that:
    #   1. PyPI credentials are scoped to releases only
    #   2. Optional manual approval gates can be enforced in repo settings
    environment:
      name: release
      url: https://pypi.org/p/pipewarden

    steps:
      # -----------------------------------------------------------------------
      # Checkout the tagged commit — not the default branch tip
      # -----------------------------------------------------------------------
      - name: Check out source code
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Use Python 3.12 to build; the package itself supports 3.10+
      # -----------------------------------------------------------------------
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # -----------------------------------------------------------------------
      # Build both the source distribution (sdist) and the wheel.
      # We always ship both so pip can install from source on exotic platforms.
      # -----------------------------------------------------------------------
      - name: Build source distribution and wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      # -----------------------------------------------------------------------
      # Upload to PyPI using Trusted Publishing (OIDC).
      # attestations=false keeps it compatible with older PyPI indices that
      # don't yet support PEP 740 attestations.
      # -----------------------------------------------------------------------
      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          attestations: false

      # -----------------------------------------------------------------------
      # Sign the wheel and sdist with Sigstore so users can verify the
      # artifacts came from this exact GitHub Actions run.
      # The action produces .sigstore bundles alongside each artifact.
      # -----------------------------------------------------------------------
      - name: Sign release artifacts with Sigstore
        uses: sigstore/gh-action-sigstore-python@v3.0.0
        with:
          inputs: |
            ./dist/*.whl
            ./dist/*.tar.gz

      # -----------------------------------------------------------------------
      # Attach everything — packages + signatures — to the GitHub Release.
      # generate_release_notes=true auto-fills the release body from the
      # commit messages since the last tag.
      # -----------------------------------------------------------------------
      - name: Attach artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/*.sigstore
            dist/*.crt
            dist/*.sig
